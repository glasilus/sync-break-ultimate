name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags:
      - "v*"

permissions:
  contents: write

env:
  PY_VERSION: "3.10"

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 1. Windows  (priority)
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Upgrade pip & install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── Build: Disc VPC 01 (main editor) ───────────────────────────────────
      - name: Build DiscVPC01.exe
        shell: cmd
        run: |
          pyinstaller ^
            --onefile --noconsole --clean --noupx ^
            --name DiscVPC01 ^
            --collect-all cv2 ^
            --collect-all librosa ^
            --collect-all scipy ^
            --collect-all soundfile ^
            --collect-all imageio_ffmpeg ^
            --collect-all numba ^
            --collect-all llvmlite ^
            --collect-all scenedetect ^
            --collect-all opensimplex ^
            --hidden-import=scenedetect.detectors ^
            gui.py

      # ── Build: Disc VPC 01 R-T (real-time) ─────────────────────────────────
      - name: Build DiscVPC01-RT.exe
        shell: cmd
        run: |
          pyinstaller ^
            --onefile --noconsole --clean --noupx ^
            --name DiscVPC01-RT ^
            --collect-all cv2 ^
            --collect-all scipy ^
            --collect-all soundfile ^
            --collect-all opensimplex ^
            --collect-all librosa ^
            --collect-all numba ^
            --collect-all llvmlite ^
            --hidden-import=sounddevice ^
            rt.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Disc-VPC-01-windows
          path: |
            dist/DiscVPC01.exe
            dist/DiscVPC01-RT.exe
            README.MD
            README_RU.MD

  # ───────────────────────────────────────────────────────────────────────────
  # 2. macOS  (best-effort)
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS
    runs-on: macos-latest
    continue-on-error: true   # macOS is secondary; don't fail the whole run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install python-tk@${{ env.PY_VERSION }} portaudio
          echo "$(brew --prefix python-tk@${{ env.PY_VERSION }})/lib/python${{ env.PY_VERSION }}/site-packages" >> $GITHUB_PATH

      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build DiscVPC01 (macOS app)
        run: |
          pyinstaller \
            --onefile --noconsole --clean --noupx \
            --name DiscVPC01 \
            --collect-all cv2 \
            --collect-all librosa \
            --collect-all scipy \
            --collect-all soundfile \
            --collect-all imageio_ffmpeg \
            --collect-all numba \
            --collect-all llvmlite \
            --collect-all scenedetect \
            --collect-all opensimplex \
            --hidden-import=scenedetect.detectors \
            gui.py

      - name: Build DiscVPC01-RT (macOS app)
        run: |
          pyinstaller \
            --onefile --noconsole --clean --noupx \
            --name DiscVPC01-RT \
            --collect-all cv2 \
            --collect-all scipy \
            --collect-all soundfile \
            --collect-all opensimplex \
            --collect-all librosa \
            --collect-all numba \
            --collect-all llvmlite \
            --hidden-import=sounddevice \
            rt.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Disc-VPC-01-macos
          path: |
            dist/DiscVPC01
            dist/DiscVPC01-RT
            README.MD
            README_RU.MD

  # ───────────────────────────────────────────────────────────────────────────
  # 3. GitHub Release  (only on version tag)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Disc-VPC-01-windows
          path: windows-files

      # macOS artifact may be absent if that job failed (continue-on-error)
      - name: Download macOS artifact (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: Disc-VPC-01-macos
          path: macos-files

      - name: Create release ZIPs
        run: |
          cd windows-files && zip -r ../Disc-VPC-01-windows.zip . && cd ..
          if [ -d macos-files ]; then
            cd macos-files && chmod +x DiscVPC01 DiscVPC01-RT 2>/dev/null || true
            zip -r ../Disc-VPC-01-macos.zip . && cd ..
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Disc VPC 01 — ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: Disc-VPC-01-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
