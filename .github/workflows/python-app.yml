name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags:
      - "v*"

permissions:
  contents: write

env:
  PY_VERSION: "3.10"
  VCPKG_DEPS: >-
    glfw3
    imgui[core,glfw-binding,opengl3-binding]
    portaudio
    fftw3
    ffmpeg[avcodec,avformat,swscale,swresample]
    nlohmann-json
    glad
    stb

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 1. Windows  (priority)
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build DiscVPC01 (Python, --onedir)
        # --onedir (was --onefile): produces dist/DiscVPC01/ with the
        # .exe + _internal/ alongside. Cold start drops from ~5 min to
        # a few seconds because the bundle is no longer extracted to
        # %TEMP% on every launch — Defender scans the DLLs once when
        # the user unzips the distribution, not on every run.
        # --splash kept: it now covers the residual cold-import time
        # for librosa/numba/scipy (≈5–15 s) instead of the extraction.
        # --icon embeds the (multi-resolution) icon into the PE so
        # Explorer / desktop / Alt-Tab all render it at the right size.
        # --add-data ships the PNG for MainGUI's runtime iconphoto().
        shell: cmd
        run: |
          pyinstaller ^
            --onedir --noconsole --clean --noupx ^
            --name DiscVPC01 ^
            --icon CDDRIVE.ico ^
            --splash CDDRIVE.png ^
            --manifest tools/disc_vpc_utf8.manifest ^
            --additional-hooks-dir tools/pyi_hooks ^
            --runtime-hook tools/pyi_rth_inner_dll_libs.py ^
            --add-data "CDDRIVE.png;." ^
            --collect-all numpy ^
            --collect-all PIL ^
            --collect-all cv2 ^
            --collect-all librosa ^
            --collect-all scipy ^
            --collect-all soundfile ^
            --collect-all sounddevice ^
            --collect-all cffi ^
            --collect-all audioread ^
            --collect-all pooch ^
            --collect-all lazy_loader ^
            --collect-all joblib ^
            --collect-all imageio_ffmpeg ^
            --collect-all numba ^
            --collect-all llvmlite ^
            --collect-all scenedetect ^
            --collect-all opensimplex ^
            --hidden-import=scenedetect.detectors ^
            --collect-submodules vpc ^
            --paths . ^
            vpc/__main__.py

      - name: Bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache vcpkg installed (Windows)
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/downloads
            vcpkg/buildtrees
          key: vcpkg-win-rel-${{ hashFiles('rt_cpp/vcpkg.json', 'rt_cpp/triplets/x64-windows-static-release.cmake') }}
          restore-keys: vcpkg-win-rel-

      - name: Install C++ dependencies (vcpkg)
        shell: cmd
        run: |
          "%VCPKG_ROOT%\vcpkg.exe" install ^
            --triplet x64-windows-static-release ^
            --overlay-triplets=rt_cpp/triplets ^
            ${{ env.VCPKG_DEPS }} || exit /b 1

      - name: Build DiscVPC01-RT.exe (C++)
        shell: cmd
        run: |
          if not exist dist mkdir dist
          cmake -S rt_cpp -B rt_cpp\build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-release ^
            -DVCPKG_OVERLAY_TRIPLETS=%GITHUB_WORKSPACE%\rt_cpp\triplets ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            -G "Visual Studio 17 2022" -A x64 || exit /b 1
          cmake --build rt_cpp\build --config Release || exit /b 1
          copy /Y rt_cpp\build\Release\DiscVPC01-RT.exe dist\DiscVPC01-RT.exe || exit /b 1

      - name: Upload Windows artifact
        # `dist/DiscVPC01/**` is the --onedir tree (DiscVPC01.exe at the
        # root + a sibling `_internal/` with all DLLs). Uploading the
        # whole subtree preserves that layout; the release zip step
        # below packs it together with the standalone RT exe.
        uses: actions/upload-artifact@v4
        with:
          name: Disc-VPC-01-windows
          if-no-files-found: error
          path: |
            dist/DiscVPC01/**
            dist/DiscVPC01-RT.exe
            README.MD
            README_RU.MD
            presets/rt_blank.json

  # ───────────────────────────────────────────────────────────────────────────
  # 2. macOS
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build tools
        run: |
          brew install pkg-config autoconf automake libtool nasm ninja dylibbundler

      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install Python dependencies
        run: |
          brew install python-tk@${{ env.PY_VERSION }} || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build DiscVPC01 (Python)
        # No --add-binary for ffmpeg: imageio-ffmpeg ships a fully
        # self-contained static ffmpeg in its wheel, which is what the
        # codebase calls first via imageio_ffmpeg.get_ffmpeg_exe(). The
        # old approach copied brew's ffmpeg, which dragged in a tree of
        # homebrew dylibs that broke on every clean Mac.
        # --icon CDDRIVE.icns sets the .app bundle icon (PyInstaller
        # writes it into Contents/Resources/ + Info.plist CFBundleIconFile).
        # --splash is intentionally omitted: PyInstaller's splash on
        # macos-arm64 is not supported (the Tk-based splash window can't
        # initialise before the main GUI on Apple Silicon runners).
        run: |
          pyinstaller \
            --onefile --windowed --clean --noupx \
            --name DiscVPC01 \
            --icon CDDRIVE.icns \
            --additional-hooks-dir tools/pyi_hooks \
            --add-data "CDDRIVE.png:." \
            --collect-all numpy \
            --collect-all PIL \
            --collect-all cv2 \
            --collect-all librosa \
            --collect-all scipy \
            --collect-all soundfile \
            --collect-all sounddevice \
            --collect-all cffi \
            --collect-all audioread \
            --collect-all pooch \
            --collect-all lazy_loader \
            --collect-all joblib \
            --collect-all imageio_ffmpeg \
            --collect-all numba \
            --collect-all llvmlite \
            --collect-all scenedetect \
            --collect-all opensimplex \
            --hidden-import=scenedetect.detectors \
            --collect-submodules vpc \
            --paths . \
            vpc/__main__.py

      - name: Bundle transitive dylibs (dylibbundler)
        # PyInstaller --windowed creates the .app shell but doesn't
        # relocate transitive dylib deps from Python C extensions
        # (sounddevice, soundfile, librosa's audioread/soxr, etc.) — so
        # they stay pinned to /opt/homebrew or /usr/local and crash on
        # any other Mac. dylibbundler walks every Mach-O in the bundle
        # and rewrites all install names to @rpath, copying missing
        # libs into Contents/Frameworks/.
        # macOS default /bin/bash is 3.2 — no `mapfile`, no process
        # substitution-friendly arrays. Build the -x flag list with a
        # plain while-read loop instead.
        shell: bash
        run: |
          set -e
          APP=dist/DiscVPC01.app
          mkdir -p "$APP/Contents/Frameworks"
          XARGS=()
          while IFS= read -r f; do
            XARGS+=( -x "$f" )
          done < <(
            { find "$APP/Contents/MacOS"      -type f -perm -u+x 2>/dev/null;
              find "$APP/Contents/Resources"  -type f \( -name "*.so" -o -name "*.dylib" \) 2>/dev/null;
              find "$APP/Contents/Frameworks" -type f \( -name "*.so" -o -name "*.dylib" \) 2>/dev/null;
            }
          )
          dylibbundler -od -b -of \
            "${XARGS[@]}" \
            -d "$APP/Contents/Frameworks/" \
            -p "@rpath/" || true

      - name: Ad-hoc codesign (Python app)
        # install_name_tool / dylibbundler invalidate any prior signature
        # which makes Gatekeeper say "is damaged and can't be opened".
        # Ad-hoc signing (--sign -) is free and gives the bundle a valid
        # signature so the standard "right-click → Open" override works
        # without the user having to run xattr in Terminal.
        run: |
          codesign --force --deep --sign - dist/DiscVPC01.app
          codesign --verify --deep --strict dist/DiscVPC01.app || true

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> $GITHUB_ENV
          if [ "$(uname -m)" = "arm64" ]; then
            echo "VCPKG_TRIPLET=arm64-osx-release" >> $GITHUB_ENV
          else
            echo "VCPKG_TRIPLET=x64-osx-release" >> $GITHUB_ENV
          fi

      - name: Cache vcpkg installed (macOS)
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/downloads
            vcpkg/buildtrees
          key: vcpkg-macos-rel-${{ hashFiles('rt_cpp/vcpkg.json', 'rt_cpp/triplets/arm64-osx-release.cmake', 'rt_cpp/triplets/x64-osx-release.cmake') }}-${{ runner.arch }}
          restore-keys: vcpkg-macos-rel-

      - name: Install C++ dependencies (vcpkg)
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            --triplet "$VCPKG_TRIPLET" \
            --overlay-triplets=rt_cpp/triplets \
            ${{ env.VCPKG_DEPS }}

      - name: Build DiscVPC01-RT (C++)
        run: |
          mkdir -p dist
          cmake -S rt_cpp -B rt_cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET" \
            -DVCPKG_OVERLAY_TRIPLETS="$GITHUB_WORKSPACE/rt_cpp/triplets" \
            -DVCPKG_MANIFEST_MODE=OFF \
            -G Ninja
          cmake --build rt_cpp/build --config Release
          cp -R rt_cpp/build/DiscVPC01-RT.app dist/DiscVPC01-RT.app
          chmod +x dist/DiscVPC01-RT.app/Contents/MacOS/*

      - name: Ad-hoc codesign (RT app)
        # vcpkg links statically on macOS (see rt_cpp/triplets/*-osx-release),
        # so the bundle is already self-contained. We just need a valid
        # signature so Gatekeeper doesn't claim it's damaged after download.
        run: |
          codesign --force --deep --sign - dist/DiscVPC01-RT.app
          codesign --verify --deep --strict dist/DiscVPC01-RT.app || true

      - name: Build distributable DMG
        # Ship as a single DMG instead of a folder of files. DMG preserves
        # the .app bundle structure, executable bits, and code signature
        # across download — none of which a plain zip reliably does.
        # Includes a README and a one-click "Setup.command" for the rare
        # case where Gatekeeper still blocks the unsigned-by-Apple bundle.
        run: |
          STAGE=dmg-stage
          mkdir -p "$STAGE"
          cp -R dist/DiscVPC01.app    "$STAGE/" || true
          cp -R dist/DiscVPC01-RT.app "$STAGE/" || true
          cp README.MD README_RU.MD   "$STAGE/" || true
          mkdir -p "$STAGE/presets"
          cp presets/rt_blank.json    "$STAGE/presets/" || true
          # Convenience link so users can drag-install if they prefer.
          ln -s /Applications "$STAGE/Applications"
          # First-run helper — strips quarantine that the browser attaches
          # on download. Users only need this if right-click → Open also
          # fails (rare, but happens on locked-down corporate Macs).
          cat > "$STAGE/Setup (first run).command" << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          xattr -dr com.apple.quarantine "$DIR/DiscVPC01.app"    2>/dev/null || true
          xattr -dr com.apple.quarantine "$DIR/DiscVPC01-RT.app" 2>/dev/null || true
          echo "Done. You can now launch the apps normally."
          read -n 1 -s -r -p "Press any key to close this window..."
          EOF
          chmod +x "$STAGE/Setup (first run).command"
          hdiutil create -volname "Disc VPC 01" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            dist/Disc-VPC-01-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Disc-VPC-01-macos
          if-no-files-found: warn
          path: dist/Disc-VPC-01-macos.dmg

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Linux  (best-effort)
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            portaudio19-dev \
            libjack-jackd2-dev \
            libasound2-dev \
            libsndfile1 \
            ffmpeg \
            libgl1 libgl1-mesa-dev libglu1-mesa-dev libegl1-mesa-dev \
            libx11-dev libxft-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev \
            build-essential cmake ninja-build pkg-config \
            autoconf automake libtool nasm \
            xvfb

      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build DiscVPC01 (Python)
        # PyInstaller has no meaningful --icon flag for ELF on Linux —
        # window icon is set at runtime via Tk iconphoto from the
        # bundled CDDRIVE.png (resolved through sys._MEIPASS). Splash
        # works on Linux and is worth including here too.
        run: |
          xvfb-run --auto-servernum pyinstaller \
            --onefile --noconsole --clean --noupx \
            --name DiscVPC01 \
            --splash CDDRIVE.png \
            --additional-hooks-dir tools/pyi_hooks \
            --add-data "CDDRIVE.png:." \
            --collect-all numpy \
            --collect-all PIL \
            --collect-all cv2 \
            --collect-all librosa \
            --collect-all scipy \
            --collect-all soundfile \
            --collect-all sounddevice \
            --collect-all cffi \
            --collect-all audioread \
            --collect-all pooch \
            --collect-all lazy_loader \
            --collect-all joblib \
            --collect-all imageio_ffmpeg \
            --collect-all numba \
            --collect-all llvmlite \
            --collect-all scenedetect \
            --collect-all opensimplex \
            --hidden-import=scenedetect.detectors \
            --collect-submodules vpc \
            --paths . \
            vpc/__main__.py

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg installed (Linux)
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/downloads
            vcpkg/buildtrees
          key: vcpkg-linux-rel-${{ hashFiles('rt_cpp/vcpkg.json', 'rt_cpp/triplets/x64-linux-release.cmake') }}
          restore-keys: vcpkg-linux-rel-

      - name: Install C++ dependencies (vcpkg)
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            --triplet x64-linux-release \
            --overlay-triplets=rt_cpp/triplets \
            ${{ env.VCPKG_DEPS }}

      - name: Build DiscVPC01-RT (C++)
        run: |
          mkdir -p dist
          cmake -S rt_cpp -B rt_cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux-release \
            -DVCPKG_OVERLAY_TRIPLETS="$GITHUB_WORKSPACE/rt_cpp/triplets" \
            -DVCPKG_MANIFEST_MODE=OFF \
            -G Ninja
          cmake --build rt_cpp/build --config Release
          cp rt_cpp/build/DiscVPC01-RT dist/DiscVPC01-RT
          chmod +x dist/DiscVPC01-RT

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Disc-VPC-01-linux
          if-no-files-found: warn
          path: |
            dist/DiscVPC01
            dist/DiscVPC01-RT
            README.MD
            README_RU.MD
            presets/rt_blank.json

  # ───────────────────────────────────────────────────────────────────────────
  # 4. GitHub Release  (only on version tag)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v') && !failure() && !cancelled()

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Disc-VPC-01-windows
          path: windows-files

      - name: Download macOS artifact (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: Disc-VPC-01-macos
          path: macos-files

      - name: Download Linux artifact (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: Disc-VPC-01-linux
          path: linux-files

      - name: Stage release files
        run: |
          cd windows-files && zip -r ../Disc-VPC-01-windows.zip . && cd ..
          # macOS artifact is already a single DMG — just rename into place.
          if [ -f macos-files/Disc-VPC-01-macos.dmg ]; then
            mv macos-files/Disc-VPC-01-macos.dmg ./Disc-VPC-01-macos.dmg
          fi
          if [ -d linux-files ]; then
            chmod +x linux-files/dist/DiscVPC01 linux-files/dist/DiscVPC01-RT 2>/dev/null || true
            cd linux-files && zip -r ../Disc-VPC-01-linux.zip . && cd ..
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Disc VPC 01 — ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            Disc-VPC-01-windows.zip
            Disc-VPC-01-macos.dmg
            Disc-VPC-01-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
